name: Infrastructure Deployment

on:
  repository_dispatch:
    types: [deploy_api, deploy_frontend]
  workflow_dispatch:
    inputs:
      artifact_bucket:
        description: 'S3 bucket for artifacts'
        required: false
      interactions_lambda_key:
        description: 'S3 key for interactions lambda'
        required: false
      contact_lambda_key:
        description: 'S3 key for contact lambda'
        required: false
      admin_lambda_key:
        description: 'S3 key for admin lambda'
        required: false
      authorizer_lambda_key:
        description: 'S3 key for authorizer lambda'
        required: false

jobs:
  terraform:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="artifact_bucket=${{ github.event.client_payload.artifact_bucket || github.event.inputs.artifact_bucket }}" \
            -var="interactions_lambda_key=${{ github.event.client_payload.interactions_lambda_key || github.event.inputs.interactions_lambda_key }}" \
            -var="contact_lambda_key=${{ github.event.client_payload.contact_lambda_key || github.event.inputs.contact_lambda_key }}" \
            -var="admin_lambda_key=${{ github.event.client_payload.admin_lambda_key || github.event.inputs.admin_lambda_key }}" \
            -var="authorizer_lambda_key=${{ github.event.client_payload.authorizer_lambda_key || github.event.inputs.authorizer_lambda_key }}" \
            -var="admin_username=${{ secrets.ADMIN_USERNAME }}" \
            -var="admin_password=${{ secrets.ADMIN_PASSWORD }}" \
            -var="ses_from_email=${{ secrets.SES_FROM_EMAIL }}" \
            -var="ses_admin_email=${{ secrets.SES_ADMIN_EMAIL }}" \
            -var="recaptcha_secret=${{ secrets.RECAPTCHA_SECRET }}" \
            -var="namedotcom_username=${{ secrets.NAMEDOTCOM_USERNAME }}" \
            -var="namedotcom_token=${{ secrets.NAMEDOTCOM_TOKEN }}"
