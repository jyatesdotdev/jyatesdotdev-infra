name: Infrastructure Deployment

on:
  repository_dispatch:
    types: [deploy_api]
  workflow_dispatch:
    inputs:
      artifact_bucket:
        description: 'S3 bucket for artifacts'
        required: true
      interactions_lambda_key:
        description: 'S3 key for interactions lambda'
        required: true
      contact_lambda_key:
        description: 'S3 key for contact lambda'
        required: true
      admin_lambda_key:
        description: 'S3 key for admin lambda'
        required: true
      authorizer_lambda_key:
        description: 'S3 key for authorizer lambda'
        required: true

jobs:
  terraform:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_VAR_artifact_bucket: ${{ github.event.client_payload.artifact_bucket || github.event.inputs.artifact_bucket }}
      TF_VAR_interactions_lambda_key: ${{ github.event.client_payload.interactions_lambda_key || github.event.inputs.interactions_lambda_key }}
      TF_VAR_contact_lambda_key: ${{ github.event.client_payload.contact_lambda_key || github.event.inputs.contact_lambda_key }}
      TF_VAR_admin_lambda_key: ${{ github.event.client_payload.admin_lambda_key || github.event.inputs.admin_lambda_key }}
      TF_VAR_authorizer_lambda_key: ${{ github.event.client_payload.authorizer_lambda_key || github.event.inputs.authorizer_lambda_key }}
      TF_VAR_admin_username: ${{ secrets.ADMIN_USERNAME }}
      TF_VAR_namedotcom_username: ${{ secrets.NAMEDOTCOM_USERNAME }}
      TF_VAR_namedotcom_token: ${{ secrets.NAMEDOTCOM_TOKEN }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Validate Deployment Inputs
        run: |
          for name in \
            TF_VAR_artifact_bucket \
            TF_VAR_interactions_lambda_key \
            TF_VAR_contact_lambda_key \
            TF_VAR_admin_lambda_key \
            TF_VAR_authorizer_lambda_key; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required"
              exit 1
            fi
          done

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Production Smoke Test
        run: ./scripts/smoke-prod.sh
